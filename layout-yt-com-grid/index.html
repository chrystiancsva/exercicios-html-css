<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube layout com Grid</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">
        <section class="principal">
            <figure class="video-principal">
                <img src="https://placehold.co/543x217" alt="">
                <figcaption class="descricao-video-principal">
                    <h1 class="titulo">Título do vídeo de destaque</h1>
                    <p class="views">18 mil visualizações</p>
                    <p class="descricao">Lorem ipsum dolor sit amet consectetur adipisicing elit. Odio maxime harum quod mollitia unde
                        iste reprehenderit ex soluta repudiandae delectus distinctio ducimus tempora, minus adipisci
                        iusto assumenda, amet in consequuntur.</p>
                </figcaption>
            </figure>
        </section>
        <section class="recomendados">
            <img src="https://placehold.co/270x56" alt="" class="propaganda">
            <ul class="lista-recomendados">
                <li>
                    <figure  class="video-recomendado">
                        <img src="https://placehold.co/101x71" alt="">
                        <figcaption class="descricao-recomendado"> 
                            <h1 class="titulo-recomendados">Um titulo de vídeo grande </h1>
                            <p class="informacoes-recomendado">Roberto Dias</p>
                            <p class="informacoes-recomendado">23  mil visualizações</p>
                            <p class="informacoes-recomendado">há 3 semanas</p>
                        </figcaption>
                    </figure>
                </li>
                <li>
                    <figure  class="video-recomendado">
                        <img src="https://placehold.co/101x71" alt="">
                        <figcaption class="descricao-recomendado">
                            <h1 class="titulo-recomendados">Um titulo de vídeo grande </h1>
                            <p class="informacoes-recomendado">Roberto Dias</p>
                            <p class="informacoes-recomendado">23  mil visualizações</p>
                            <p class="informacoes-recomendado">há 3 semanas</p>
                        </figcaption>
                    </figure>
                </li>
                <li>
                    <figure  class="video-recomendado">
                        <img src="https://placehold.co/101x71" alt="">
                        <figcaption class="descricao-recomendado">
                            <h1 class="titulo-recomendados">Um titulo de vídeo grande </h1>
                            <p class="informacoes-recomendado">Roberto Dias</p>
                            <p class="informacoes-recomendado">23  mil visualizações</p>
                            <p class="informacoes-recomendado">há 3 semanas</p>
                        </figcaption>
                    </figure>
                </li>
            </ul>
        </section>
        
        
    </main>


</body>

</html>
